<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #a0a09b;
      --accent: #1D9E75;
      --accent-light: #E1F5EE;
      --high: #D85A30;
      --high-bg: #FAECE7;
      --high-text: #993C1D;
      --med: #BA7517;
      --med-bg: #FAEEDA;
      --med-text: #854F0B;
      --low: #639922;
      --low-bg: #EAF3DE;
      --low-text: #3B6D11;
      --danger: #E24B4A;
      --danger-bg: #FCEBEB;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-pill: 99px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    .app {
      width: 100%;
      max-width: 520px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .header h1 span {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }
    .stats-label {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    /* Input area */
    .input-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.125rem;
      margin-bottom: 1rem;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .input-row input {
      flex: 1;
      height: 38px;
      padding: 0 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input::placeholder { color: var(--text-tertiary); }
    .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
    .add-btn {
      height: 38px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .add-btn:hover { background: #188a64; }
    .add-btn:active { transform: scale(0.97); }
    .add-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    .prio-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .prio-label { font-size: 12px; color: var(--text-tertiary); margin-right: 2px; }
    .prio-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      border: 0.5px solid var(--border-strong);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .prio-btn:hover { background: var(--bg); }
    .prio-btn.active-high { background: var(--high-bg); color: var(--high-text); border-color: var(--high); }
    .prio-btn.active-med  { background: var(--med-bg);  color: var(--med-text);  border-color: var(--med); }
    .prio-btn.active-low  { background: var(--low-bg);  color: var(--low-text);  border-color: var(--low); }

    /* Filters */
    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .filter-btn {
      font-family: inherit;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .filter-btn.active { background: var(--text-primary); color: var(--surface); border-color: var(--text-primary); }

    /* Task list */
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      transition: opacity 0.2s, transform 0.15s;
      animation: slideIn 0.18s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item.done { opacity: 0.45; }
    .task-item:hover { border-color: var(--border-strong); }

    .task-check {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .prio-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-high { background: var(--high); }
    .dot-med  { background: var(--med); }
    .dot-low  { background: var(--low); }

    .task-text {
      flex: 1;
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }
    .task-date {
      font-size: 11px;
      color: var(--text-tertiary);
      white-space: nowrap;
    }
    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 3px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .del-btn:hover { color: var(--danger); background: var(--danger-bg); }
    .del-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-tertiary);
      font-size: 14px;
      line-height: 1.6;
    }
    .empty svg { width: 32px; height: 32px; stroke: var(--text-tertiary); fill: none; stroke-width: 1.5; margin-bottom: 10px; opacity: 0.6; }

    /* Footer row */
    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 0.5px solid var(--border);
    }
    .remaining { font-size: 12px; color: var(--text-tertiary); }
    .clear-btn {
      font-family: inherit;
      font-size: 12px;
      color: var(--text-tertiary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--danger); }

    @media (max-width: 480px) {
      body { padding: 1.5rem 0.75rem 3rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .task-item { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>
<main class="app">
  <div class="header">
    <h1><span aria-hidden="true"></span>My tasks</h1>
    <span class="stats-label" id="stats" aria-live="polite"></span>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task…" aria-label="New task" autocomplete="off">
      <button class="add-btn" onclick="addTask()" aria-label="Add task">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </div>
    <div class="prio-row">
      <span class="prio-label">Priority:</span>
      <button class="prio-btn active-high" id="pHigh" onclick="setPrio('high')" aria-pressed="true">🔥 High</button>
      <button class="prio-btn" id="pMed"  onclick="setPrio('med')"  aria-pressed="false">— Med</button>
      <button class="prio-btn" id="pLow"  onclick="setPrio('low')"  aria-pressed="false">🌿 Low</button>
    </div>
  </div>

  <div class="filter-row" role="group" aria-label="Filter tasks">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('high',this)">🔥 High</button>
    <button class="filter-btn" onclick="setFilter('med',this)">— Med</button>
    <button class="filter-btn" onclick="setFilter('low',this)">🌿 Low</button>
  </div>

  <ul class="task-list" id="taskList" aria-label="Tasks" aria-live="polite"></ul>

  <div class="footer-row">
    <span class="remaining" id="remaining"></span>
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>
</main>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let prio = 'high', filter = 'all';

  function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); }

  function setPrio(p) {
    prio = p;
    ['high','med','low'].forEach(x => {
      const b = document.getElementById('p' + x[0].toUpperCase() + x.slice(1));
      b.className = 'prio-btn' + (x === p ? ' active-' + x : '');
      b.setAttribute('aria-pressed', x === p ? 'true' : 'false');
    });
  }

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function addTask() {
    const inp = document.getElementById('taskInput');
    const text = inp.value.trim();
    if (!text) { inp.focus(); return; }
    tasks.push({
      id: Date.now(),
      text,
      prio,
      done: false,
      date: new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })
    });
    inp.value = '';
    save();
    render();
    inp.focus();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const list = document.getElementById('taskList');
    let visible = tasks;
    if (filter === 'active') visible = tasks.filter(t => !t.done);
    else if (filter === 'done') visible = tasks.filter(t => t.done);
    else if (['high','med','low'].includes(filter)) visible = tasks.filter(t => t.prio === filter);

    const order = { high: 0, med: 1, low: 2 };
    const sorted = [...visible].sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return order[a.prio] - order[b.prio];
    });

    if (sorted.length === 0) {
      list.innerHTML = `<li class="empty">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>
        <div>${tasks.length === 0 ? 'No tasks yet — add one above.' : 'No tasks match this filter.'}</div>
      </li>`;
    } else {
      list.innerHTML = sorted.map(t => `
        <li class="task-item${t.done ? ' done' : ''}">
          <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" aria-label="Mark '${esc(t.text)}' done">
          <span class="prio-dot dot-${t.prio}" title="${t.prio} priority" aria-label="${t.prio} priority"></span>
          <span class="task-text">${esc(t.text)}</span>
          <span class="task-date">${t.date}</span>
          <button class="del-btn" onclick="remove(${t.id})" aria-label="Delete '${esc(t.text)}'">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </li>`).join('');
    }

    const done = tasks.filter(t => t.done).length;
    const total = tasks.length;
    document.getElementById('stats').textContent = total ? `${done} of ${total} done` : '';
    const left = total - done;
    document.getElementById('remaining').textContent = left > 0 ? `${left} task${left !== 1 ? 's' : ''} remaining` : '';
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
